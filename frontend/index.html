<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ Heavy Haulage Permits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>NZ Heavy Haulage Permits</h1>
    <p class="tagline">MVP — load classifier</p>
  </header>

  <main>
    <section class="card">
      <h2>Check a load</h2>
      <form id="load-form">
        <div class="row">
          <label for="width">Width (m)</label>
          <input type="number" id="width" name="width_m" step="0.01" min="0.1" max="15" required value="6.5" />
        </div>
        <div class="row">
          <label for="height">Height (m)</label>
          <input type="number" id="height" name="height_m" step="0.01" min="0.1" max="8" required value="5.2" />
        </div>
        <div class="row">
          <label for="length">Length (m)</label>
          <input type="number" id="length" name="length_m" step="0.01" min="0.1" max="50" required value="14.0" />
        </div>
        <div class="row">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" name="weight_kg" step="1" min="1" max="300000" required value="28000" />
        </div>
        <div class="row checkbox-row">
          <label for="indivisible">
            <input type="checkbox" id="indivisible" name="indivisible" checked />
            Load is indivisible
          </label>
        </div>
        <button type="submit" id="submit-btn">Classify load</button>
      </form>
    </section>

    <section class="card result" id="result-card" hidden>
      <h2>Result</h2>
      <div id="result-content"></div>
    </section>

    <section class="card error" id="error-card" hidden>
      <h2>Error</h2>
      <p id="error-message"></p>
    </section>
  </main>

  <footer>
    <small>NZ Heavy Haulage Permits MVP · VDAM Rule 2016</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
